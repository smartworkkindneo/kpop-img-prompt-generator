    <style>
/* ==========================================================================
   Base Styles & Variables
   ========================================================================= */
:root {
    --bg-primary: #080b16;
    --bg-secondary: rgba(15, 22, 42, 0.6);
    --border-color: rgba(255, 255, 255, 0.08);
    --border-highlight: rgba(255, 255, 255, 0.15);
    
    --text-primary: #f8fafc;
    --text-secondary: #94a3b8;
    --text-muted: #64748b;
    
    --accent-primary: #ef4444; /* Red 500 */
    --accent-secondary: #b91c1c; /* Red 700 */
    --accent-glow: rgba(239, 68, 68, 0.5);
    
    --success: #10b981; /* Emerald */
    --danger: #ef4444; /* Red */
    
    --card-bg: rgba(17, 24, 39, 0.45);
    --card-backdrop: blur(20px);
    --card-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
    
    --font-family: 'Plus Jakarta Sans', 'Noto Sans JP', sans-serif;
    --transition-smooth: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    background-color: var(--bg-primary);
    color: var(--text-primary);
    font-family: var(--font-family);
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
    line-height: 1.6;
}

/* ==========================================================================
   Background Decorative Elements (Premium Glow)
   ========================================================================= */
.background-decor {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: -1;
    pointer-events: none;
    overflow: hidden;
}

.glow-sphere {
    position: absolute;
    border-radius: 50%;
    filter: blur(120px);
    opacity: 0.15;
}

.sphere-1 {
    top: -10%;
    right: 10%;
    width: 500px;
    height: 500px;
    background: radial-gradient(circle, #7f1d1d 0%, transparent 70%);
}

.sphere-2 {
    bottom: 10%;
    left: -10%;
    width: 600px;
    height: 600px;
    background: radial-gradient(circle, rgba(239, 68, 68, 0.2) 0%, transparent 70%);
}

/* ==========================================================================
   Layout
   ========================================================================= */
.app-container {
    max-width: 1000px;
    margin: 0 auto;
    padding: 2.5rem 1.5rem;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
    gap: 2rem;
}

header {
    text-align: center;
    margin-bottom: 1rem;
}

.logo {
    display: inline-flex;
    align-items: center;
    gap: 0.75rem;
    margin-bottom: 0.5rem;
}

header h1 {
    font-size: 2.5rem;
    font-weight: 700;
    letter-spacing: -0.03em;
    background: linear-gradient(135deg, var(--text-primary) 30%, #cbd5e1 100%);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
}

.subtitle {
    color: var(--text-secondary);
    font-size: 1.05rem;
    font-weight: 400;
}

.grid-layout {
    display: grid;
    grid-template-columns: minmax(0, 1fr);
    gap: 2rem;
    align-items: start;
}

/* ==========================================================================
   Glassmorphism Cards
   ========================================================================= */
.glass-card {
    background: var(--card-bg);
    backdrop-filter: var(--card-backdrop);
    -webkit-backdrop-filter: var(--card-backdrop);
    border: 1px solid var(--border-color);
    border-radius: 20px;
    padding: 2rem;
    box-shadow: var(--card-shadow);
    transition: var(--transition-smooth);
}

.glass-card:hover {
    border-color: rgba(255, 255, 255, 0.12);
}

.card-header-actions {
    display: flex;
    justify-content: center;
    width: 100%;
    margin-bottom: 1rem;
}

/* ==========================================================================
   Buttons
   ========================================================================= */
.btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 0.5rem;
    padding: 0.75rem 1.5rem;
    border-radius: 12px;
    font-family: var(--font-family);
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
    border: none;
    transition: var(--transition-smooth);
}

.btn-primary {
    background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
    color: white;
}

.btn-glow {
    position: relative;
    box-shadow: 0 4px 20px 0 var(--accent-glow);
}

.btn-glow:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 24px 0 rgba(239, 68, 68, 0.7);
}

.btn-glow:active {
    transform: translateY(0);
}

.btn-large-run {
    padding: 1.25rem 3.5rem;
    font-size: 1.3rem;
    border-radius: 16px;
    letter-spacing: 0.05em;
}

.btn-large-copy {
    background: rgba(255, 255, 255, 0.08);
    color: var(--text-primary);
    border: 1px solid var(--border-highlight);
    padding: 1.1rem;
    font-size: 1.1rem;
    width: 100%;
    margin-bottom: 0.75rem;
    border-radius: 12px;
}

.btn-large-copy:hover:not(:disabled) {
    background: rgba(255, 255, 255, 0.18);
    border-color: rgba(255, 255, 255, 0.3);
    transform: translateY(-1px);
}

.btn-large-copy:disabled {
    opacity: 0.3;
    cursor: not-allowed;
    transform: none;
}

/* ==========================================================================
   Result Output Panel
   ========================================================================= */
.result-panel {
    display: flex;
    flex-direction: column;
    gap: 2rem;
}

.result-card {
    display: flex;
    flex-direction: column;
    gap: 1.5rem;
    min-width: 0;
}

.prompt-box-wrapper {
    display: flex;
    flex-direction: column;
}

.prompt-output {
    background: rgba(0, 0, 0, 0.3);
    border: 1px solid var(--border-color);
    border-radius: 12px;
    padding: 1.5rem;
    font-size: 1.05rem;
    color: var(--text-primary);
    min-height: 100px;
    white-space: pre-wrap;
    word-break: break-all;
    overflow-wrap: anywhere;
    font-family: inherit;
    transition: var(--transition-smooth);
    width: 100%;
    box-sizing: border-box;
}

.info-banner {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    background: rgba(16, 185, 129, 0.08);
    border: 1px solid rgba(16, 185, 129, 0.25);
    border-radius: 10px;
    padding: 0.8rem 1.2rem;
    font-size: 0.85rem;
    color: #a7f3d0;
}

.info-icon {
    width: 1.2rem;
    height: 1.2rem;
    color: var(--success);
    flex-shrink: 0;
}

/* ==========================================================================
   Toast Notifications
   ========================================================================= */
.toast {
    position: fixed;
    bottom: 2rem;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: rgba(16, 185, 129, 0.95);
    backdrop-filter: blur(10px);
    color: white;
    padding: 0.8rem 1.8rem;
    border-radius: 12px;
    box-shadow: 0 10px 25px rgba(16, 185, 129, 0.3);
    display: flex;
    align-items: center;
    gap: 0.6rem;
    z-index: 1000;
    opacity: 0;
    transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.3s ease;
    font-weight: 600;
}

.toast.show {
    transform: translateX(-50%) translateY(0);
    opacity: 1;
}

.toast-icon {
    width: 1.2rem;
    height: 1.2rem;
}

.prompt-output.highlight {
    animation: highlightFade 0.6s ease-out;
}

@keyframes highlightFade {
    0% {
        box-shadow: 0 0 0 2px var(--accent-primary);
        background: rgba(239, 68, 68, 0.15);
    }
    100% {
        box-shadow: 0 0 0 0px transparent;
        background: rgba(0, 0, 0, 0.3);
    }
}

footer {
    text-align: center;
    color: var(--text-muted);
    font-size: 0.8rem;
    margin-top: auto;
    padding-top: 2rem;
    border-top: 1px solid rgba(255, 255, 255, 0.03);
}
</style>

function generateComposition() {
    const choices = {};
    Object.keys(parameterData).forEach(key => {
        const items = parameterData[key].items;
        const selectedIndex = Math.floor(Math.random() * items.length);
        choices[key] = {
            ja: items[selectedIndex].ja,
            en: items[selectedIndex].en,
            index: selectedIndex + 1
        };
    });
    return choices;
}

function buildPrompts(choices) {
    const isMultiple = choices.A.ja.includes("複数");
    let promptJa = "";

    const elementsJaSingle = [
        `対象・人数: ${choices.A.ja}`,
        `顔・体型の特徴: ${choices.B.ja}`,
        `服装スタイル: ${choices.C.ja}`,
        `服の色: ${choices.D.ja}`,
        `髪型: ${choices.E.ja}`,
        `表情: ${choices.F.ja}`,
        `視線: ${choices.G.ja}`,
        `ポーズ: ${choices.H.ja}`,
        `スタジオ内装: ${choices.I.ja}`,
        `時間帯・色合い: ${choices.J.ja}`,
        `カメラ構図: ${choices.K.ja}`,
        `写真の質感: ${choices.L.ja}`
    ];

    const fixedRules = [
        "このブログの記事に合うサムネイルを生成（※厳密に守る）",
        "日本人（※厳密に守る）",
        "写真生成（※厳密に守る）",
        "文字は無し（※厳密に守る）",
        "K-POPダンス（※厳密に守る）",
        "縦横比率はスクエア画像（※厳密に守る）",
        "カメラ目線NG（※厳密に守る）",
        "頭の上と左右に十分な余白をとる（※厳密に守る）"
    ];

    if (!isMultiple) {
        promptJa = `【ランダム要素構成】\n- ${elementsJaSingle.join('\n- ')}\n\n【固定プロンプト】\n・${fixedRules.join('\n・')}`;
    } else {
        const instructorJaDesc = `30代女性または男性のダンス講師（シンプルなTシャツ and トラックパンツ、笑顔で優しくレッスンを見守り指導する姿、主役の生徒を引き立てる配置、目線は生徒に向けている）`;

        const elementsJaMultiple = [
            `手前の生徒(主役): ${choices.A.ja.replace("複数 (", "").replace(")", "")}`,
            `生徒の顔・体型特徴: ${choices.B.ja}`,
            `生徒の服装・色: ${choices.C.ja}（${choices.D.ja}）`,
            `生徒の髪型: ${choices.E.ja}`,
            `生徒の表情・視線: ${choices.F.ja} / ${choices.G.ja}`,
            `生徒のダンスポーズ: ${choices.H.ja}`,
            `奥の講師(自動): ${instructorJaDesc}`,
            `スタジオ内装: ${choices.I.ja}`,
            `時間帯・色合い: ${choices.J.ja}`,
            `カメラ構図: ${choices.K.ja}`,
            `写真の質感: ${choices.L.ja}（師弟の関係性が伝わるピント調整）`
        ];

        promptJa = `【ランダム要素構成】\n- ${elementsJaMultiple.join('\n- ')}\n\n【固定プロンプト】\n・${fixedRules.join('\n・')}\n・ダンスレッスン風景2人構図`;
    }

    return {
        ja: promptJa,
        isMultiple: isMultiple
    };
}

function showToast(message) {
    toastMessage.textContent = message;
    toastElement.classList.add('show');
    setTimeout(() => {
        toastElement.classList.remove('show');
    }, 2500);
}

async function copyToClipboard(text, successMessage) {
    try {
        await navigator.clipboard.writeText(text);
        showToast(successMessage);
    } catch (err) {
        const textArea = document.createElement('textarea');
        textArea.value = text;
        document.body.appendChild(textArea);
        textArea.select();
        document.execCommand('copy');
        showToast(successMessage);
        document.body.removeChild(textArea);
    }
}

function handleExecution() {
    const choices = generateComposition();
    const prompts = buildPrompts(choices);
    
    outputJa.textContent = prompts.ja;
    outputJa.classList.add('highlight');
    setTimeout(() => {
        outputJa.classList.remove('highlight');
    }, 600);
    
    if (prompts.isMultiple) {
        specialRulesBanner.style.display = 'flex';
        specialRulesText.textContent = "「複数人」ルール適用：奥に並ぶダンス講師の描写（笑顔で見守る・トラックパンツ着用・カメラ目線なし）が自動調整されています。";
    } else {
        specialRulesBanner.style.display = 'none';
    }
    
    copyJaBtn.removeAttribute('disabled');
    showToast('新しい条件でプロンプトを生成しました！');
}

runBtn.addEventListener('click', handleExecution);
copyJaBtn.addEventListener('click', () => {
    copyToClipboard(outputJa.textContent, 'プロンプトをコピーしました！');
});

lucide.createIcons();
